apiVersion: batch/v1
kind: Job
metadata:
  name: eshopx-migrate
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: davidchen617/eshopx-api:latest
          command: ["dotnet", "ef", "database", "update", "--context", "EShopContext"]
          env:
            - name: ConnectionStrings__PostgreSQL
              value: Host=eshopx-postgres;Port=5432;Username=user;Password=password;Database=eShopX
