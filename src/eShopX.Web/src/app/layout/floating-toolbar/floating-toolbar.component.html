<div class="fixed bottom-6 right-6 z-40">
  <div class="relative">
    <div
      class="flex items-center gap-3 rounded-full border border-neutral-200 bg-white px-3 py-2 shadow-lg"
      (click)="close()"
    >
      <button
        type="button"
        class="flex h-9 w-9 items-center justify-center rounded-full border border-neutral-200 bg-white text-neutral-700"
        title="Tools"
      >
        <span class="text-base">⋯</span>
      </button>
      <button
        type="button"
        class="flex h-9 w-9 items-center justify-center rounded-full border border-neutral-200 bg-white text-neutral-700"
        title="Search"
        (click)="toggle(); $event.stopPropagation()"
      >
        <span class="text-base">🔍</span>
      </button>
      <button
        type="button"
        class="flex h-9 w-9 items-center justify-center rounded-full border border-neutral-200 bg-white text-neutral-700"
        title="Language"
      >
        <span class="text-base">🌐</span>
      </button>
    </div>

    @if (isOpen()) {
      <div
        class="absolute bottom-16 right-0 w-[320px] rounded-2xl border border-neutral-200 bg-white p-4 shadow-xl"
      >
        <div class="text-xs font-semibold uppercase tracking-widest text-neutral-500">Search</div>
        <div class="mt-3 flex items-center gap-2 rounded-full border border-neutral-200 px-3 py-2">
          <input
            class="w-full bg-transparent text-sm outline-none"
            placeholder="請輸入關鍵字"
            [value]="query()"
            (input)="query.set($any($event.target).value ?? '')"
            (keydown.enter)="submit()"
          />
          <button type="button" class="text-neutral-600" (click)="submit()">🔍</button>
        </div>
      </div>
    }
  </div>
</div>
