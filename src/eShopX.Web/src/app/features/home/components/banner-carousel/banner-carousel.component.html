<div class="banner-carousel mx-2 sm:mx-0">
  <div
    class="banner-frame relative overflow-hidden rounded-3xl border border-white/70 bg-bg-card shadow-[0_20px_50px_-40px_rgba(0,0,0,0.45)]"
  >
    <nz-carousel class="block h-52 sm:h-64" nzAutoPlay [nzAutoPlaySpeed]="3500" nzEffect="scrollx">
      @for (slide of slides(); track slide.id; let first = $first) {
        <div nz-carousel-content class="h-52 sm:h-64">
          <a
            [routerLink]="slide.link"
            class="block relative h-full"
            draggable="false"
            (dragstart)="$event.preventDefault()"
          >
            <img
              [src]="slide.imageUrl"
              [alt]="slide.title"
              class="w-full h-full object-cover select-none"
              [loading]="first ? 'eager' : 'lazy'"
              draggable="false"
              (dragstart)="$event.preventDefault()"
            />
            <div
              class="pointer-events-none absolute inset-0 bg-gradient-to-r from-black/40 via-black/10 to-transparent"
            ></div>
            <div
              class="pointer-events-none absolute bottom-4 left-4 right-4 rounded-2xl bg-white/85 p-4 backdrop-blur"
            >
              <div class="text-xs uppercase tracking-[0.3em] text-primary-hover/70">Hot pick</div>
              <h3 class="mt-1 text-lg font-extrabold text-text-primary">
                {{ slide.title }}
              </h3>
            </div>
          </a>
        </div>
      }
    </nz-carousel>
  </div>
</div>
