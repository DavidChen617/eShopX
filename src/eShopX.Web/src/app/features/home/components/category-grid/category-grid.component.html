<section
  class="category-grid mx-2 mt-6 rounded-3xl border border-white/70 bg-white/80 p-5 shadow-[0_20px_40px_-35px_rgba(0,0,0,0.35)] sm:mx-0"
>
  <div class="mb-4 flex items-center justify-between">
    <div class="text-sm font-semibold text-[#2E1A0F]">熱門分類</div>
    <a routerLink="/products" class="text-xs font-semibold text-[#FF6A1A]">全部分類 →</a>
  </div>
  <div class="grid grid-cols-5 gap-3 sm:grid-cols-10">
    @for (cat of categories(); track cat.id) {
      <a
        [routerLink]="'/products'"
        [queryParams]="{ categoryId: cat.id, categoryName: cat.name }"
        class="group flex flex-col items-center rounded-2xl px-2 py-3 transition hover:-translate-y-1 hover:bg-[#FFF5F0]"
      >
        <div
          class="flex h-12 w-12 items-center justify-center rounded-2xl bg-gradient-to-br from-[#FF8A4C]/20 to-[#FFD3B5]/60 text-2xl shadow-sm"
        >
          {{ cat.icon }}
        </div>
        <span class="mt-2 text-[11px] font-semibold text-[#6B4C3B] group-hover:text-[#FF6A1A]">{{
          cat.name
        }}</span>
      </a>
    }
  </div>
</section>
