apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: eshopx-ing
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - eshop-x.com
    secretName: super-cow
  rules:
  - host: eshop-x.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: eshopx-web
            port:
              number: 80
