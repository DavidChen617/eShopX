<section class="flash-sale-section mx-2 mt-6 overflow-hidden rounded-3xl border border-[#FF8A4C]/40 bg-gradient-to-br from-white to-[#FFF4EE] shadow-[0_24px_50px_-40px_rgba(0,0,0,0.45)] sm:mx-0">
  <!-- 標題列 -->
  <div class="flex flex-wrap items-center justify-between gap-3 px-5 py-4">
    <div class="flex items-center gap-3">
      <span class="inline-flex h-10 w-10 items-center justify-center rounded-2xl bg-[#FF5000]/10 text-[#FF5000]">
        <nz-icon nzType="fire" nzTheme="outline" class="text-xl"></nz-icon>
      </span>
      <div>
        <div class="text-xs font-semibold uppercase tracking-[0.3em] text-[#FF6A1A]/70">Flash</div>
        <div class="text-lg font-extrabold text-[#2E1A0F]">限時秒殺</div>
      </div>
    </div>

    <!-- 倒計時 -->
    <div class="flash-countdown flex items-center gap-2 rounded-full bg-white px-4 py-2 text-xs font-semibold text-[#2E1A0F] shadow-sm">
      <span class="text-[#6B4C3B]">距結束</span>
      <nz-countdown
        [nzValue]="countdownDeadline()"
        nzFormat="HH:mm:ss"
        [nzValueStyle]="{ color: '#FF2D54', fontWeight: '700', fontSize: '13px' }"
      ></nz-countdown>
    </div>

    <a routerLink="/products" [queryParams]="{ flash: 'true' }" class="text-xs font-semibold text-[#FF6A1A] flex items-center">
      更多秒殺
      <nz-icon nzType="right" nzTheme="outline"></nz-icon>
    </a>
  </div>

  <!-- 場次 Tab（用按鈕實現） -->
  <div class="flex gap-2 px-4 pb-3 overflow-x-auto">
    @for (slot of data().slots; track slot.id; let i = $index) {
      <button
        (click)="onSlotChange(i)"
        class="flex-shrink-0 rounded-2xl border px-4 py-2 text-center text-xs font-semibold transition"
        [class.bg-[#FF5000]]="isSlotSelected(i)"
        [class.border-[#FF5000]]="isSlotSelected(i)"
        [class.text-white]="isSlotSelected(i)"
        [class.border-white]="!isSlotSelected(i)"
        [class.bg-white]="!isSlotSelected(i)"
      >
        <div
          class="text-sm font-bold"
          [class.text-white]="isSlotSelected(i)"
          [class.text-[#2E1A0F]]="!isSlotSelected(i)"
        >
          {{ slot.label }}
        </div>
        <div
          class="text-xs mt-1"
          [class.text-white/80]="isSlotSelected(i)"
          [class.text-[#6B4C3B]]="!isSlotSelected(i)"
        >
          {{ getSlotStatusText(slot) }}
        </div>
      </button>
    }
  </div>

  <!-- 商品橫向滾動列表 -->
  <div class="overflow-x-auto px-4 pb-5">
    <div class="flex gap-4">
      @for (item of filteredItems(); track item.productId) {
        <app-flash-sale-card [item]="item" />
      }
    </div>
  </div>
</section>
