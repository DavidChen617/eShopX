<article
  class="group rounded-[22px] border border-neutral-200 bg-white p-3 transition hover:-translate-y-1 hover:shadow-lg"
  [routerLink]="linkToDetail ? ['/products', product.productId] : null"
>
  <div class="relative">
    <div class="aspect-[4/5] w-full overflow-hidden rounded-xl bg-neutral-100">
      @if (product.primaryImageUrl) {
        <img
          class="h-full w-full object-cover"
          [src]="product.primaryImageUrl"
          [alt]="product.name"
        />
      }
    </div>
    @if (badge) {
      <ui-badge class="absolute left-3 top-3" variant="accent">
        {{ badge }}
      </ui-badge>
    }
  </div>
  <div class="mt-3 flex items-center justify-between">
    <div>
      <div class="text-sm font-semibold text-neutral-900">
        {{ product.name }}
      </div>
      <div class="text-xs text-neutral-500">{{ product.description }}</div>
    </div>
    <div class="text-sm font-semibold text-neutral-900">\${{ product.price }}</div>
  </div>
  <div class="mt-2 text-[11px] uppercase tracking-widest text-neutral-400">
    {{ product.isActive ? 'Available' : 'Unavailable' }}
  </div>
</article>
