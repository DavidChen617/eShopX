<section class="bg-[#efebe4]">
  <div class="mx-auto max-w-6xl px-4 py-16 sm:px-6 lg:px-8">
    <div class="rounded-[28px] border border-neutral-200 bg-white p-6">
      <div class="flex items-center justify-center">
        <div class="relative w-full max-w-2xl">
          <input
            class="w-full border-b border-neutral-400 bg-transparent px-1 py-2 text-sm outline-none placeholder:text-neutral-500"
            placeholder="What are you looking for?"
            [value]="query()"
            (input)="query.set($any($event.target).value ?? '')"
            (keydown.enter)="submit()"
          />
          <button
            type="button"
            class="absolute right-0 top-1/2 -translate-y-1/2 text-neutral-500"
            (click)="submit()"
          >
            🔍
          </button>
        </div>
      </div>
    </div>
  </div>
</section>

<section class="bg-[#efebe4] pb-16">
  <div class="mx-auto max-w-6xl px-4 sm:px-6 lg:px-8">
    <div class="grid gap-6 sm:grid-cols-2 lg:grid-cols-4">
      @for (product of products(); track product) {
      <article class="rounded-[22px] border border-neutral-200 bg-white p-4">
        <div
          class="mb-3 inline-flex rounded-full bg-neutral-100 px-3 py-1 text-[11px] font-semibold uppercase tracking-widest text-neutral-500"
        >
          Bestseller
        </div>
        <div class="aspect-[4/3] w-full overflow-hidden rounded-2xl bg-neutral-100">
          <img
            class="h-full w-full object-cover"
            [src]="product.primaryImageUrl"
            [alt]="product.name"
          />
        </div>
        <div class="mt-4 text-sm font-semibold text-neutral-900">{{ product.name }}</div>
        <div class="text-xs text-neutral-500">{{ product.description }}</div>
        <div class="mt-3 flex items-center justify-between text-sm">
          <div class="flex items-center gap-1">
            <span class="h-3 w-3 rounded-full bg-neutral-300"></span>
            <span class="h-3 w-3 rounded-full bg-neutral-400"></span>
            <span class="h-3 w-3 rounded-full bg-neutral-500"></span>
            <span class="text-xs text-neutral-500">+3</span>
          </div>
          <div class="font-semibold text-neutral-900">$ {{ product.price }}</div>
        </div>
      </article>
      } @for (_ of [0,1,2,3]; track _) {
      <div
        class="h-80 rounded-[22px] border border-dashed border-neutral-200 bg-white"
        [class.hidden]="!isLoading() || products().length > 0"
      ></div>
      }
    </div>
  </div>
</section>
