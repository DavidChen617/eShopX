<ui-section title="主頁 Banner 設定" subtitle="管理首頁輪播 Banner。">
  @if (isLoading()) {
  <div class="h-32 rounded-2xl border border-dashed border-neutral-200 bg-neutral-50"></div>
  } @if (!isLoading() && !isAdmin()) {
  <div class="rounded-2xl border border-rose-200 bg-rose-50 p-4 text-sm text-rose-700">
    只有管理員可以查看此頁。
  </div>
  } @if (error()) {
  <div class="mt-4 rounded-2xl border border-rose-200 bg-rose-50 p-4 text-sm text-rose-700">
    {{ error() }}
  </div>
  } @if (!isLoading() && isAdmin()) {
  <div class="rounded-2xl border border-neutral-200 bg-white p-6 text-sm text-neutral-600">
    Banner CRUD 設定頁已建立入口。下一步可在這裡接上
    `/api/homepage/banners` 的新增、編輯、刪除與排序功能。
  </div>
  }
</ui-section>
