<section class="relative flex min-h-[90dvh] items-center justify-center overflow-hidden bg-[radial-gradient(circle_at_top,_#f1f5f9,_#e2e8f0_35%,_#ffffff_70%)] px-4 py-16">
  <div class="pointer-events-none absolute -left-24 -top-24 h-72 w-72 rounded-full bg-gradient-to-br from-sky-200/60 to-teal-200/40 blur-3xl"></div>
  <div class="pointer-events-none absolute -right-24 bottom-0 h-80 w-80 rounded-full bg-gradient-to-br from-amber-200/50 to-rose-200/40 blur-3xl"></div>

  <div class="relative w-full max-w-lg rounded-3xl border border-white/70 bg-white/85 p-8 shadow-[0_30px_80px_rgba(15,23,42,0.12)] backdrop-blur">
    <div class="flex items-center justify-between">
      <div>
        <div class="text-xs font-semibold uppercase tracking-[0.35em] text-sky-600">eShopX</div>
        <div class="mt-2 text-3xl font-bold text-neutral-900">建立新帳戶</div>
        <div class="mt-2 text-sm text-neutral-500">完成註冊後即可開始購物或申請成為賣家。</div>
      </div>
      <div class="hidden h-14 w-14 items-center justify-center rounded-2xl bg-neutral-900 text-white sm:flex">
        <span class="text-lg font-semibold">EX</span>
      </div>
    </div>

    <form class="mt-6 space-y-4" (ngSubmit)="submit()">
      <div class="space-y-2">
        <label class="text-[11px] font-semibold uppercase tracking-[0.3em] text-neutral-500">Name</label>
        <input
          class="w-full rounded-xl border border-neutral-200 bg-white px-3 py-3 text-sm focus:border-neutral-900 focus:outline-none"
          type="text"
          [value]="name()"
          (input)="name.set($any($event.target).value ?? '')"
          placeholder="Your name"
          autocomplete="name"
        />
      </div>
      <div class="space-y-2">
        <label class="text-[11px] font-semibold uppercase tracking-[0.3em] text-neutral-500">Email</label>
        <input
          class="w-full rounded-xl border border-neutral-200 bg-white px-3 py-3 text-sm focus:border-neutral-900 focus:outline-none"
          type="email"
          [value]="email()"
          (input)="email.set($any($event.target).value ?? '')"
          placeholder="you@example.com"
          autocomplete="email"
        />
      </div>
      <div class="space-y-2">
        <label class="text-[11px] font-semibold uppercase tracking-[0.3em] text-neutral-500">Phone</label>
        <input
          class="w-full rounded-xl border border-neutral-200 bg-white px-3 py-3 text-sm focus:border-neutral-900 focus:outline-none"
          type="tel"
          [value]="phone()"
          (input)="phone.set($any($event.target).value ?? '')"
          placeholder="0912-345-678"
          autocomplete="tel"
        />
      </div>
      <div class="space-y-2">
        <label class="text-[11px] font-semibold uppercase tracking-[0.3em] text-neutral-500">Password</label>
        <input
          class="w-full rounded-xl border border-neutral-200 bg-white px-3 py-3 text-sm focus:border-neutral-900 focus:outline-none"
          type="password"
          [value]="password()"
          (input)="password.set($any($event.target).value ?? '')"
          placeholder="••••••••"
          autocomplete="new-password"
        />
      </div>
      <div class="space-y-2">
        <label class="text-[11px] font-semibold uppercase tracking-[0.3em] text-neutral-500">Confirm Password</label>
        <input
          class="w-full rounded-xl border border-neutral-200 bg-white px-3 py-3 text-sm focus:border-neutral-900 focus:outline-none"
          type="password"
          [value]="confirmPassword()"
          (input)="confirmPassword.set($any($event.target).value ?? '')"
          placeholder="••••••••"
          autocomplete="new-password"
        />
      </div>

      @if (error()) {
        <div class="rounded-xl border border-rose-200 bg-rose-50 px-3 py-2 text-xs text-rose-600">{{ error() }}</div>
      }
      @if (success()) {
        <div class="rounded-xl border border-emerald-200 bg-emerald-50 px-3 py-2 text-xs text-emerald-700">{{ success() }}</div>
      }

      <button
        type="submit"
        class="w-full rounded-xl bg-sky-500 px-4 py-3 text-sm font-semibold text-white transition hover:-translate-y-0.5 hover:bg-sky-400"
      >
        {{ isSubmitting() ? '註冊中...' : '建立帳戶' }}
      </button>
    </form>

    <div class="mt-6 text-center text-xs text-neutral-500">
      已有帳號？
      <a routerLink="/auth/login" class="font-semibold text-sky-600 hover:text-sky-500">前往登入</a>
    </div>
  </div>
</section>

<footer class="pb-10 text-center text-xs text-neutral-400">
  <a class="hover:text-neutral-600" href="#">隱私權政策</a>
  <span class="px-2">·</span>
  <a class="hover:text-neutral-600" href="#">服務條款</a>
</footer>
