apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: eshopx-redis-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
    storageClassName: local-path
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eshopx-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eshopx-redis
  template:
    metadata:
      labels:
        app: eshopx-redis
    spec:
      nodeSelector:
        kubernetes.io/hostname: k8s-work1
      containers:
        - name: redis
          image: redis:latest
          ports:
            - containerPort: 6379
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: eshopx-redis-secret
                  key: REDIS_PASSWORD
          args:
            - "redis-server"
            - "--requirepass"
            - "$(REDIS_PASSWORD)"
            - "--appendonly"
            - "yes"
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: eshopx-redis-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: eshopx-redis
spec:
  selector:
    app: eshopx-redis
  ports:
    - port: 6379
      targetPort: 6379
