<section class="product-feed mx-2 mt-6 sm:mx-0">
  <!-- 標題 -->
  <div class="mb-4 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <span class="inline-flex h-9 w-9 items-center justify-center rounded-2xl bg-[#FF5000]/10 text-[#FF5000]">
        <nz-icon nzType="appstore" nzTheme="outline"></nz-icon>
      </span>
      <div>
        <div class="text-xs uppercase tracking-[0.3em] text-[#FF6A1A]/70">Selected</div>
        <span class="text-base font-extrabold text-[#2E1A0F]">{{ title() }}</span>
      </div>
    </div>
    <a routerLink="/products" class="text-xs font-semibold text-[#FF6A1A]">查看更多 →</a>
  </div>

  <!-- 雙欄商品網格 -->
  <div class="grid grid-cols-2 gap-4">
    @for (product of products(); track product.id) {
      <a [routerLink]="['/products', product.id]" class="group overflow-hidden rounded-3xl border border-white/70 bg-white/90 shadow-[0_20px_45px_-35px_rgba(0,0,0,0.4)] transition hover:-translate-y-1">
        <img
          [src]="product.imageUrl"
          [alt]="product.name"
          class="h-44 w-full object-cover"
        />
        <div class="p-4">
          <div class="text-sm font-semibold text-[#2E1A0F] line-clamp-2">{{ product.name }}</div>
          <div class="mt-3 flex items-baseline gap-2">
            <span class="text-lg font-extrabold text-[#FF2D54]">NT$ {{ product.price }}</span>
            @if (product.originalPrice) {
              <span class="text-xs text-gray-400 line-through">NT$ {{ product.originalPrice }}</span>
            }
          </div>
          @if (product.salesCount) {
            <div class="mt-2 text-xs text-[#6B4C3B]">已售 {{ product.salesCount }}+</div>
          }
          @if (product.shopName) {
            <div class="mt-2 text-xs text-gray-500 truncate">{{ product.shopName }}</div>
          }
        </div>
      </a>
    }
  </div>
</section>
