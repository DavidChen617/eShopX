@if (isLoading()) {
<div class="flex items-center justify-center h-64">
  <nz-spin nzSimple [nzSize]="'large'"></nz-spin>
</div>
} @else {
<div class="relative overflow-hidden bg-gradient-to-b from-primary-light via-white to-bg-warm">
  <div
    class="pointer-events-none absolute -top-32 right-[-120px] h-80 w-80 rounded-full bg-primary-hover/20 blur-3xl"
  ></div>
  <div
    class="pointer-events-none absolute top-72 left-[-140px] h-72 w-72 rounded-full bg-gold/20 blur-3xl"
  ></div>

  <div class="mx-auto max-w-6xl px-4 pb-14 pt-6">
    @if (banners().length) {
    <app-banner-carousel [slides]="banners()" />
    }

    <div class="mt-8">
      <div>
        <div class="text-xs font-semibold uppercase tracking-[0.3em] text-primary-hover/70">
          Categories
        </div>
        <h2 class="mt-2 text-2xl font-extrabold text-text-primary">分類直達</h2>
      </div>
      <div class="mt-4 rounded-3xl bg-bg-card p-4 shadow-sm">
        <app-category-grid [categories]="categories()" />
      </div>
    </div>

    <div class="mt-10">
      <app-product-feed [products]="recommendProducts()" title="猜你喜歡" />
    </div>
  </div>
</div>
}
