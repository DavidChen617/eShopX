@if (isLoading()) {
<div class="flex items-center justify-center h-64">
  <nz-spin nzSimple [nzSize]="'large'"></nz-spin>
</div>
} @else {
<div class="relative overflow-hidden bg-gradient-to-b from-primary-light via-white to-bg-warm">
  <div
    class="pointer-events-none absolute -top-32 right-[-120px] h-80 w-80 rounded-full bg-primary-hover/20 blur-3xl"
  ></div>
  <div
    class="pointer-events-none absolute top-72 left-[-140px] h-72 w-72 rounded-full bg-gold/20 blur-3xl"
  ></div>

  <div class="mx-auto max-w-6xl px-4 pb-14 pt-6">
    <div
      class="mb-6 rounded-3xl bg-gradient-to-br from-primary via-primary-hover to-accent p-6 text-white shadow-[0_24px_60px_-30px_rgba(255,80,0,0.65)]"
    >
      <div class="text-xs font-semibold uppercase tracking-[0.3em] text-white/70">Taobao style</div>
      <h1 class="mt-3 text-3xl font-extrabold leading-tight sm:text-4xl">
        春日大促開跑<br />今日必搶好物
      </h1>
      <p class="mt-3 text-sm text-white/90">秒殺、限時折扣一站搞定，平台賣家優惠同步上架。</p>
      <div class="mt-6 flex flex-wrap items-center gap-3">
        <button
          class="rounded-full bg-white px-5 py-2 text-sm font-semibold text-[#FF5000] shadow-sm"
        >
          立即搶購
        </button>
        <button
          class="rounded-full border border-white/50 px-5 py-2 text-sm font-semibold text-white"
        >
          逛逛分類
        </button>
      </div>
    </div>

    @if (banners().length) {
    <app-banner-carousel [slides]="banners()" />
    }

    @if (flashSale(); as sale) {
    <app-flash-sale-section [data]="sale" />
    }

    <div class="mt-8">
      <div class="flex items-center justify-between">
        <div>
          <div class="text-xs font-semibold uppercase tracking-[0.3em] text-primary-hover/70">
            Categories
          </div>
          <h2 class="mt-2 text-2xl font-extrabold text-text-primary">分類直達</h2>
        </div>
        <span class="text-xs font-semibold text-primary-hover">更多分類</span>
      </div>
      <div class="mt-4 rounded-3xl bg-bg-card p-4 shadow-sm">
        <app-category-grid [categories]="categories()" />
      </div>
    </div>

    <div class="mt-10">
      <app-product-feed [products]="recommendProducts()" title="猜你喜歡" />
    </div>
  </div>
</div>
}
