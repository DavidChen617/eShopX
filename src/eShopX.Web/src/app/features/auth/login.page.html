<section
  class="relative flex min-h-[90dvh] items-center justify-center overflow-hidden bg-[radial-gradient(circle_at_top,_#fff6e9,_#fef3c7_35%,_#fff_70%)] px-4 py-16"
>
  <div
    class="pointer-events-none absolute -left-24 -top-24 h-72 w-72 rounded-full bg-gradient-to-br from-amber-200/50 to-rose-200/40 blur-3xl"
  ></div>
  <div
    class="pointer-events-none absolute -right-24 bottom-0 h-80 w-80 rounded-full bg-gradient-to-br from-sky-200/60 to-emerald-200/40 blur-3xl"
  ></div>

  <div
    class="relative w-full max-w-lg rounded-3xl border border-white/70 bg-white/80 p-8 shadow-[0_30px_80px_rgba(15,23,42,0.12)] backdrop-blur"
  >
    <div class="flex items-center justify-between">
      <div>
        <div class="text-xs font-semibold uppercase tracking-[0.35em] text-amber-600">eShopX</div>
        <div class="mt-2 text-3xl font-bold text-neutral-900">歡迎回來</div>
        <div class="mt-2 text-sm text-neutral-500">請登入以管理訂單、商品與付款。</div>
      </div>
    </div>

    <div class="mt-6 grid gap-3 sm:grid-cols-2">
      <button
        type="button"
        class="w-full rounded-xl border border-neutral-200 bg-white px-4 py-3 text-sm font-semibold text-neutral-900 shadow-sm transition hover:-translate-y-0.5 hover:bg-neutral-50"
        (click)="loginWithGoogle()"
      >
        使用 Google 登入
      </button>
      <button
        type="button"
        class="w-full rounded-xl border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm font-semibold text-emerald-700 transition hover:-translate-y-0.5 hover:bg-emerald-100"
        (click)="loginWithLine()"
      >
        使用 LINE 登入
      </button>
    </div>

    <div class="my-6 flex items-center gap-4 text-xs text-neutral-400">
      <div class="h-px flex-1 bg-neutral-200"></div>
      或使用 Email
      <div class="h-px flex-1 bg-neutral-200"></div>
    </div>

    <form class="space-y-4" (ngSubmit)="submit()">
      <div class="space-y-2">
        <label class="text-[11px] font-semibold uppercase tracking-[0.3em] text-neutral-500"
          >Email</label
        >
        <input
          class="w-full rounded-xl border border-neutral-200 bg-white px-3 py-3 text-sm focus:border-neutral-900 focus:outline-none"
          type="email"
          [value]="email()"
          (input)="email.set($any($event.target).value ?? '')"
          placeholder="you@example.com"
          autocomplete="email"
        />
      </div>
      <div class="space-y-2">
        <label class="text-[11px] font-semibold uppercase tracking-[0.3em] text-neutral-500"
          >Password</label
        >
        <input
          class="w-full rounded-xl border border-neutral-200 bg-white px-3 py-3 text-sm focus:border-neutral-900 focus:outline-none"
          type="password"
          [value]="password()"
          (input)="password.set($any($event.target).value ?? '')"
          placeholder="••••••••"
          autocomplete="current-password"
        />
      </div>
      @if (error()) {
      <div class="rounded-xl border border-rose-200 bg-rose-50 px-3 py-2 text-xs text-rose-600">
        {{ error() }}
      </div>
      }
      <button
        type="submit"
        class="w-full rounded-xl bg-amber-500 px-4 py-3 text-sm font-semibold text-neutral-900 transition hover:-translate-y-0.5 hover:bg-amber-400"
      >
        {{ isSubmitting() ? '登入中...' : '登入' }}
      </button>
      <a
        routerLink="/auth/register"
        class="mt-3 block w-full rounded-xl border border-neutral-200 bg-white px-4 py-3 text-center text-sm font-semibold text-neutral-700 transition hover:-translate-y-0.5 hover:bg-neutral-50"
      >
        註冊新帳號
      </a>
    </form>

  </div>
</section>

<footer class="pb-10 text-center text-xs text-neutral-400">
  <a class="hover:text-neutral-600" href="#">隱私權政策</a>
  <span class="px-2">·</span>
  <a class="hover:text-neutral-600" href="#">服務條款</a>
</footer>
